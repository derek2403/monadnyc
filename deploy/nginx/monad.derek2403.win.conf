# Monad Arcade vhost — mirrors the house style of gym.conf / enclave.conf.
# Tunnel route: monad.derek2403.win -> http://localhost:80 (this nginx).
server {
    listen 80;
    server_name monad.derek2403.win;
    resolver 127.0.0.11 valid=10s;
    client_max_body_size 25m;

    location / {
        # Variable host so nginx re-resolves the container via Docker DNS and
        # survives `docker compose up` recreating it. $request_uri preserves the
        # path AND query string — the game WS URLs carry ?code=..&clientId=..,
        # which a bare `proxy_pass $var;` would drop.
        set $monad monad-app:3000;
        proxy_pass http://$monad$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived WebSocket connections from being cut.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
