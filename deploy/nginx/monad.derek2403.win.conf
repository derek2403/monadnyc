# Reverse-proxy vhost for the Monad Arcade.
# TLS is terminated at Cloudflare; this listens on plain HTTP :80.
server {
    listen 80;
    server_name www.monad.derek2403.win monad.derek2403.win;

    # Re-resolve the app container at request time via Docker's embedded DNS
    # (127.0.0.11). This way nginx survives `docker compose up` recreating the
    # app container (new IP) without needing a reload, and won't fail to start
    # if the app is momentarily down.
    resolver 127.0.0.11 valid=10s;
    set $monad_upstream monad-app:3000;

    # Allow large uploads / model files; tune as needed.
    client_max_body_size 25m;

    location / {
        # $request_uri preserves the path AND query string (the game WS URLs
        # carry ?code=...&clientId=...), which a variable proxy_pass would
        # otherwise drop.
        proxy_pass http://$monad_upstream$request_uri;
        proxy_http_version 1.1;

        # WebSocket upgrade (uses the map in ws-upgrade-map.conf).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare tells us the original scheme; pass it through so the app
        # knows requests are HTTPS even though the origin hop is HTTP.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Matches are short, but keep long-lived WS connections from being cut.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
