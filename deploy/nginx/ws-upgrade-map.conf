# WebSocket upgrade helper. Maps the Upgrade header to the right Connection
# value. Required by the /api/ws and /api/bark endpoints.
#
# NOTE: if any OTHER site in your conf.d already defines a
# `map $http_upgrade $connection_upgrade { ... }`, DO NOT add this file too —
# nginx will refuse to start with a "duplicate map" error. One copy per nginx.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
