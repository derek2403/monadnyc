services:
  monad-app:
    build:
      context: .
      args:
        # Compose reads this from the .env file in this directory at build time
        # and bakes it into the browser bundle. Falls back to the public RPC.
        NEXT_PUBLIC_MONAD_RPC_URL: ${NEXT_PUBLIC_MONAD_RPC_URL:-https://testnet-rpc.monad.xyz}
    image: monad-app
    container_name: monad-app
    restart: always
    # Also expose the vars to the running process (server.mjs additionally reads
    # the .env FILE mounted below for PRIVATE_KEY / MONAD_RPC_URL).
    env_file: .env
    volumes:
      - ./.env:/app/.env:ro
    # No host port — nginx-proxy reaches it by name (monad-app:3000) over the
    # shared 'proxy' network, exactly like enclave-ui / gym-app.
    networks:
      - proxy

networks:
  # The network created by your nginx-proxy compose. Must already exist.
  proxy:
    name: proxy
    external: true
